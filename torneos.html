<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Torneos - Kings Legend</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            background:
                radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.1), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 234, 255, 0.08), transparent 40%),
                #0a0a0f;
            color: white;
        }

        /* HEADER */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        .top-bar img {
            height: 95px;
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.6));
        }

        .user-section {
            display: flex;
            gap: 20px;
        }

        .logout-btn {
            cursor: pointer;
            color: #ccc;
        }

        .logout-btn:hover {
            color: #ff4d4d;
        }

        /* CONTENIDO */
        .container {
            padding: 60px;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .header-section h1 {
            cursor: pointer;
        }

        .create-team-btn {
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            background: #111;
            color: #00f7ff;
            border: 2px solid #00f7ff;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .create-team-btn:hover {
            box-shadow: 0 0 15px #00f7ff,
                0 0 30px #00f7ff;
            transform: scale(1.05);
        }

        /* STATS */
        .stats-section {
            display: flex;
            gap: 30px;
            margin-bottom: 40px;
        }

        .stat-box {
            flex: 1;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            background: rgba(15, 15, 20, 0.9);
            border: 1px solid rgba(212, 175, 55, 0.2);
            transition: 0.3s;
            cursor: pointer;
        }

        .stat-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.3);
        }

        .stat-box h3 {
            font-size: 28px;
            color: #d4af37;
            margin-bottom: 10px;
        }

        /* ESTADO */
        .my-status {
            margin-bottom: 40px;
            padding: 20px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            background: rgba(15, 15, 20, 0.8);
        }

        /* flecha*/
        .left-section {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            cursor: pointer;
            color: #aaa;
            font-size: 14px;
            transition: 0.3s ease;
            /* 👈 AÑADE ESTO */
        }

        .back-btn:hover {
            color: #d4af37;
            text-shadow: 0 0 8px rgba(212, 175, 55, 0.6);
            transform: translateX(-4px);
        }

        .clickable-logo {
            cursor: pointer;
            transition: 0.3s ease;
        }

        .clickable-logo:hover {
            transform: scale(1.05);
        }

        /* GRID */
        .tournaments-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .tournament-card {
            background: rgba(15, 15, 20, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            transition: 0.3s;
        }

        .tournament-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }

        .status {
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 15px;
        }

        .open {
            background: rgba(0, 255, 120, 0.2);
            color: #00ff88;
        }

        .closed {
            background: rgba(255, 0, 0, 0.2);
            color: #ff4d4d;
        }

        .join-btn {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            transition: 0.3s;
        }

        .join-btn:hover {
            background: linear-gradient(135deg, #d4af37, #b8962e);
            color: black;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
        }

        .cancel-btn {
            background: rgba(255, 0, 0, 0.15);
            color: #ff4d4d;
            margin-top: 10px;
        }

        .cancel-btn:hover {
            background: rgba(255, 0, 0, 0.3);
        }

        .modal-content {
            background: rgba(15, 15, 20, 0.98);
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .modal-content input {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .modal-content button {
            padding: 10px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            background: linear-gradient(135deg, #d4af37, #b8962e);
        }

        .modal-content select {
            padding: 10px;
            border-radius: 8px;
            background-color: #1e1e1e;
            /* oscuro */
            color: white;
            /* texto visible */
            border: 1px solid #444;
        }

        .close-btn {
            background: rgba(255, 0, 0, 0.2);
        }

        /*Team card*/
        .team-card {
            background: rgba(15, 15, 20, 0.95);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 15px;
            padding: 25px;
            transition: 0.3s;
        }

        .team-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.4);
        }

        .team-members {
            margin-top: 10px;
            font-size: 14px;
            color: #ccc;
        }
    </style>
</head>

<body>

    <div class="top-bar">

        <div class="left-section">
            <span class="back-btn" onclick="window.location.href='index.html'">
                ← Volver
            </span>
            <img src="logo.png" alt="logo" onclick="goHome()" class="clickable-logo">
        </div>

        <div class="user-section">
            <span id="userEmail"></span>
            <span class="logout-btn" onclick="logout()">Cerrar sesión</span>
        </div>

    </div>

    <div class="container">

        <div class="header-section">
            <h1 id="mainTitle">Torneos Activos</h1>
            <div style="display:flex;gap:15px;">
                <button class="create-team-btn" onclick="createTeam()">
                    + Crear Equipo
                </button>

                <button class="create-team-btn" style="background:rgba(255,255,255,0.08);color:white;"
                    onclick="showRegisteredTeams()">
                    Unirse a equipo
                </button>
            </div>
        </div>

        <div class="stats-section" id="statsSection">
            <div class="stat-box" id="playersBox">
                <h3 id="playersCount">0</h3>
                <p>Jugadores Activos</p>
            </div>

            <div class="stat-box" id="openBox">
                <h3 id="openCount">0</h3>
                <p>Torneos Abiertos</p>
            </div>

            <div class="stat-box" onclick="showRegisteredTeams()">
                <h3 id="teamsCount">0</h3>
                <p>Equipos Registrados</p>
            </div>
        </div>

        <div class="my-status" id="myStatusSection">
            <p><strong>Equipo:</strong>
                <span id="teamStatus">No tienes equipo</span>
            </p>
        </div>

        <hr style="margin:40px 0; border-color:rgba(212,175,55,0.2)">

        <h2>Equipos Disponibles</h2>
        <div id="teamsContainer" class="tournaments-grid"></div>
        <div id="registeredTeamsSection" style="display:none; margin-top:40px;">
            <h2>Equipos Registrados</h2>
            <div id="registeredTeamsContainer" class="tournaments-grid"></div>
        </div>
        <div id="moreInfoSection" style="display:none; margin-top:40px;">
            <h2>Más Información</h2>
            <p>Aquí irá la información detallada del torneo.</p>
        </div>
        <div class="tournaments-grid" id="tournamentsContainer"></div>

    </div> <!-- cierre de container -->


    <!-- MODAL -->
    <div id="teamModal" class="modal">
        <div class="modal-content">
            <h2>Crear Equipo</h2>

            <input type="text" id="teamName" placeholder="Nombre del equipo">
            <input type="text" id="teamTag" placeholder="Tag (Ej: KLG)">

            <!-- 🔥 AÑADE ESTO -->
            <select id="teamType">
                <option value="public">Público (cualquiera puede unirse)</option>
                <option value="private">Cerrado (requiere solicitud)</option>
                <option value="invite">Solo invitación</option>
            </select>

            <button onclick="saveTeam()">Guardar Equipo</button>
            <button class="close-btn" onclick="closeModal()">Cancelar</button>
        </div>
    </div>

    <!-- 👇 PEGA ESTO AQUÍ 👇 -->

    <div id="kickModal" class="modal">
        <div class="modal-content" style="text-align:center;">
            <h2 style="color:#d4af37;">Confirmar expulsión</h2>

            <p id="kickMessage" style="margin:20px 0;"></p>

            <div style="display:flex;gap:15px;justify-content:center;">
                <button id="confirmKickBtn" style="background:#ff4d4d;color:white;">
                    Expulsar
                </button>

                <button onclick="closeKickModal()" style="background:rgba(255,255,255,0.1);color:white;">
                    Cancelar
                </button>
            </div>
        </div>
    </div>


    <script>

        /* 🔐 PROTEGER */
        if (!localStorage.getItem("userLogged")) {
            window.location.href = "login.html";
        }

        /* 👤 USUARIO */
        const userEmail = localStorage.getItem("userEmail");
        const username = localStorage.getItem("username");

        document.getElementById("userEmail").textContent = username || userEmail;
        let kickMode = false;
        let kickTarget = null;
        let kickTeamId = null;
        let currentView = "tournaments";
        // "tournaments" | "registered"
        function toggleKickMode() {
            kickMode = !kickMode;
            renderTeams();
        }
        document.getElementById("userEmail").textContent = userEmail;

        /* 📦 EQUIPOS */
        let teams = JSON.parse(localStorage.getItem("teams")) || [];

        /* 🔍 BUSCAR MI EQUIPO */
        function getMyTeam() {
            return teams.find(team =>
                team.members.some(member => member.email === userEmail)
            );
        }

        /* 🧾 ACTUALIZAR ESTADO */
        function updateTeamStatus() {
            const myTeam = getMyTeam();

            if (myTeam) {
                document.getElementById("teamStatus").textContent =
                    myTeam.name + " [" + myTeam.tag + "]";
            } else {
                document.getElementById("teamStatus").textContent =
                    "No tienes equipo";
            }
        }

        updateTeamStatus();

        /* 📦 TORNEOS */
        const tournaments = [
            { nombre: "Kings Weekly #1", premio: "300€", estado: "Abierto" },
            { nombre: "Gold Division Cup", premio: "150€", estado: "Cerrado" },
            { nombre: "Diamond Showdown", premio: "500€", estado: "Abierto" }
        ];
        /* 🎮 RENDER EQUIPOS */
        function renderTeams() {

            teams = JSON.parse(localStorage.getItem("teams")) || [];
            const container = document.getElementById("teamsContainer");
            container.innerHTML = "";

            teams.forEach(team => {

                const membersCount = team.members.length;
                const isFull = membersCount >= 7;
                const isMember = team.members.some(m => m.email === userEmail);
                const isCaptain = team.captain === userEmail;

                const card = document.createElement("div");
                card.classList.add("team-card");

                card.innerHTML = `
              
    <h3>${team.name} [${team.tag}]</h3>
    <p>Miembros: ${membersCount}/7</p>

    <div class="team-members">
    ${team.members.map(m => `
        <div style="display:flex;justify-content:space-between;align-items:center;">
            <span>• ${m.email}</span>

            ${kickMode && isCaptain && m.email !== userEmail ? `
                <span onclick="kickPlayer(${team.id},'${m.email}')"
                    style="color:#ff4d4d;font-weight:bold;cursor:pointer;">
                    ✖
                </span>
            ` : ""}
        </div>
    `).join("")}
</div>

    ${team.invites.includes(userEmail) && !isMember ? `
        <div style="color:#00ff88;margin-bottom:10px;">
            🔔 Tienes una invitación para este equipo
        </div>
    ` : ""}

    ${isMember
                        ? `<button class="join-btn" onclick="leaveTeam(${team.id})">
            ${isCaptain ? "Eliminar equipo" : "Abandonar equipo"}
           </button>`
                        : isFull
                            ? `<button class="join-btn" disabled>EQUIPO LLENO</button>`
                            : team.type === "public"
                                ? `<button class="join-btn" onclick="joinTeam(${team.id})">
                    Unirme
                   </button>`
                                : team.type === "private"
                                    ? `<button class="join-btn" onclick="requestJoin(${team.id})">
                        Solicitar unirme
                       </button>`
                                    : team.type === "invite"
                                        ? team.invites.includes(userEmail)
                                            ? `<button class="join-btn" onclick="joinTeam(${team.id})">
                                Aceptar invitación
                               </button>`
                                            : `<button class="join-btn" disabled>
                                Solo por invitación
                               </button>`
                                        : ""
                    }

   ${isCaptain ? `
    <div style="margin-top:10px;display:flex;gap:10px;">
        <button onclick="invitePlayer(${team.id})"
            style="background:#00aaff;border:none;padding:6px 10px;border-radius:6px;cursor:pointer;">
            Invitar jugador
        </button>

        <button onclick="toggleKickMode()"
            style="background:#ff4d4d;border:none;padding:6px 10px;border-radius:6px;cursor:pointer;">
            ${kickMode ? "Cancelar" : "Expulsar"}
        </button>
    </div>
` : ""}

    ${isCaptain && team.requests.length > 0 ? `
        <div style="margin-top:15px;padding:10px;background:rgba(255,255,255,0.05);border-radius:8px;">
            <strong>Solicitudes pendientes:</strong>
            ${team.requests.map(req => `
                <div style="margin-top:8px;">
                    ${req}
                    <button onclick="acceptRequest(${team.id},'${req}')"
                        style="margin-left:8px;background:#00ff88;border:none;padding:3px 8px;border-radius:5px;cursor:pointer;">
                        Aceptar
                    </button>
                    <button onclick="rejectRequest(${team.id},'${req}')"
                        style="margin-left:5px;background:#ff4d4d;border:none;padding:3px 8px;border-radius:5px;cursor:pointer;">
                        Rechazar
                    </button>
                </div>
            `).join("")}
        </div>
    ` : ""}
`;

                container.appendChild(card);
            });

            document.getElementById("teamsCount").textContent = teams.length;
        }
        function leaveTeam(teamId) {

            teams = JSON.parse(localStorage.getItem("teams")) || [];

            const teamIndex = teams.findIndex(t => t.id === teamId);
            if (teamIndex === -1) return;

            const team = teams[teamIndex];

            // 👑 Si es capitán → eliminar equipo entero
            if (team.captain === userEmail) {

                if (!confirm("Eres el capitán. ¿Eliminar el equipo completo?")) return;

                teams.splice(teamIndex, 1);

            } else {

                team.members = team.members.filter(m => m.email !== userEmail);
            }

            localStorage.setItem("teams", JSON.stringify(teams));

            updateTeamStatus();
            renderTeams();
        }

        renderTeams();
        function joinTeam(teamId) {

            teams = JSON.parse(localStorage.getItem("teams")) || [];

            if (getMyTeam()) {
                alert("Ya estás en un equipo.");
                return;
            }

            const team = teams.find(t => t.id === teamId);
            if (!team) return;

            if (team.members.length >= 7) {
                alert("El equipo está lleno.");
                return;
            }

            // 🔥 Si venía por invitación, quitarla
            if (team.invites.includes(userEmail)) {
                team.invites = team.invites.filter(email => email !== userEmail);
            }

            team.members.push({
                email: userEmail,
                role: "member"
            });

            localStorage.setItem("teams", JSON.stringify(teams));

            updateTeamStatus();
            renderTeams();
        }
        function invitePlayer(teamId) {

            teams = JSON.parse(localStorage.getItem("teams")) || [];

            const team = teams.find(t => t.id === teamId);
            if (!team) return;

            if (team.captain !== userEmail) {
                alert("Solo el capitán puede invitar.");
                return;
            }

            const emailToInvite = prompt("Introduce el email del jugador:");

            if (!emailToInvite) return;

            if (team.invites.includes(emailToInvite)) {
                alert("Ese jugador ya está invitado.");
                return;
            }

            team.invites.push(emailToInvite);

            localStorage.setItem("teams", JSON.stringify(teams));

            alert("Invitación enviada.");
        }


        function acceptRequest(teamId, email) {

            teams = JSON.parse(localStorage.getItem("teams")) || [];

            const team = teams.find(t => t.id === teamId);
            if (!team) return;

            if (team.members.length >= 7) {
                alert("El equipo está lleno.");
                return;
            }

            team.members.push({
                email: email,
                role: "member"
            });

            team.requests = team.requests.filter(req => req !== email);

            localStorage.setItem("teams", JSON.stringify(teams));

            renderTeams();
        }


        function rejectRequest(teamId, email) {

            teams = JSON.parse(localStorage.getItem("teams")) || [];

            const team = teams.find(t => t.id === teamId);
            if (!team) return;

            team.requests = team.requests.filter(req => req !== email);

            localStorage.setItem("teams", JSON.stringify(teams));

            renderTeams();
        }
        function kickPlayer(teamId, playerEmail) {

            kickTarget = playerEmail;
            kickTeamId = teamId;

            document.getElementById("kickMessage").innerHTML =
                `¿Seguro que quieres expulsar a <strong style="color:#d4af37;">${playerEmail}</strong>?`;

            document.getElementById("kickModal").style.display = "flex";
        }
        function closeKickModal() {
            document.getElementById("kickModal").style.display = "none";
        }

        document.getElementById("confirmKickBtn").addEventListener("click", function () {

            let teams = JSON.parse(localStorage.getItem("teams")) || [];

            const team = teams.find(t => t.id === kickTeamId);
            if (!team) return;

            team.members = team.members.filter(m => m.email !== kickTarget);

            localStorage.setItem("teams", JSON.stringify(teams));

            kickMode = false;
            closeKickModal();
            renderTeams();
        });

        /* 📊 CONTADORES */
        document.getElementById("playersCount").textContent =
            Math.floor(Math.random() * 500) + 200;

        document.getElementById("openCount").textContent =
            tournaments.filter(t => t.estado === "Abierto").length;

        document.getElementById("teamsCount").textContent = teams.length;

        /* 🎮 RENDER TORNEOS */
        const container = document.getElementById("tournamentsContainer");

        function renderTournaments(filter = "ALL") {

            container.innerHTML = "";

            tournaments.forEach(torneo => {

                if (filter === "OPEN" && torneo.estado !== "Abierto") return;

                const joined = JSON.parse(localStorage.getItem("joinedTournaments")) || [];
                const isJoined = joined.includes(torneo.nombre);
                const statusClass = torneo.estado === "Abierto" ? "open" : "closed";

                const card = document.createElement("div");
                card.classList.add("tournament-card");

                card.innerHTML = `
            <div class="status ${statusClass}">${torneo.estado}</div>
            <h2>${torneo.nombre}</h2>
            <p><strong>Premio:</strong> ${torneo.premio}</p>
            <p><strong>Formato:</strong> 5v5 Competitivo</p>
            <p><strong>Inicio:</strong> 12 Marzo 2026</p>

            ${isJoined ? `
                <button class="join-btn" disabled 
                    style="background:rgba(0,255,120,0.2);color:#00ff88;cursor:default">
                    INSCRITO
                </button>
                <button class="join-btn cancel-btn"
                    onclick="cancelTournament('${torneo.nombre}')">
                    Cancelar inscripción
                </button>
            ` : `
                <button class="join-btn"
                    onclick="joinTournament('${torneo.nombre}','${torneo.estado}')">
                    Unirse
                </button>
                  <button class="join-btn"
                    style="background:rgba(255,255,255,0.1);margin-top:10px;"
                    onclick="showMoreInfo()">
                    Más información
                </button>
            `}
        `;

                container.appendChild(card);
            });
        }

        renderTournaments();

        /* 🎯 FILTROS */
        document.getElementById("openBox").addEventListener("click", () => {
            renderTournaments("OPEN");
        });

        document.getElementById("mainTitle").addEventListener("click", () => {
            showMyTeams();
            renderTournaments("ALL");
        });

        /* 🪟 MODAL */
        function createTeam() {
            document.getElementById("teamModal").style.display = "flex";
        }

        function closeModal() {
            document.getElementById("teamModal").style.display = "none";
        }

        /* 🏗️ CREAR EQUIPO */
        function saveTeam() {

            // 🔄 actualizar lista
            teams = JSON.parse(localStorage.getItem("teams")) || [];

            // 🚫 No permitir estar en 2 equipos
            if (getMyTeam()) {
                alert("Ya estás en un equipo.");
                return;
            }

            const name = document.getElementById("teamName").value.trim();
            const tag = document.getElementById("teamTag").value.trim();

            if (!name || !tag) {
                alert("Completa nombre y tag.");
                return;
            }

            const newTeam = {
                id: Date.now(),
                name: name,
                tag: tag,
                captain: userEmail,
                type: document.getElementById("teamType").value, // public | private | invite
                members: [
                    {
                        email: userEmail,
                        role: "captain"
                    }
                ],
                requests: [],
                invites: []
            };

            teams.push(newTeam);
            localStorage.setItem("teams", JSON.stringify(teams));

            document.getElementById("teamsCount").textContent = teams.length;

            updateTeamStatus();
            closeModal();
        }

        /* 🎮 UNIRSE A TORNEO */
        function joinTournament(nombre, estado) {

            if (estado !== "Abierto") {
                alert("Este torneo está cerrado.");
                return;
            }

            if (!getMyTeam()) {
                alert("Debes crear un equipo antes de unirte.");
                return;
            }

            let joined = JSON.parse(localStorage.getItem("joinedTournaments")) || [];

            if (joined.includes(nombre)) return;

            joined.push(nombre);
            localStorage.setItem("joinedTournaments", JSON.stringify(joined));

            renderTournaments();
        }

        /* ❌ CANCELAR TORNEO */
        function cancelTournament(nombre) {

            let joined = JSON.parse(localStorage.getItem("joinedTournaments")) || [];

            joined = joined.filter(t => t !== nombre);

            localStorage.setItem("joinedTournaments", JSON.stringify(joined));

            renderTournaments();
        }

        /* 🚪 LOGOUT */
        function logout() {
            localStorage.removeItem("userLogged");
            localStorage.removeItem("userEmail");
            window.location.href = "index.html";
        }
        function showRegisteredTeams() {

            currentView = "registered";

            document.getElementById("statsSection").style.display = "none";
            document.getElementById("myStatusSection").style.display = "none";
            document.getElementById("teamsContainer").style.display = "none";
            document.getElementById("tournamentsContainer").style.display = "none";

            document.getElementById("registeredTeamsSection").style.display = "block";

            renderRegisteredTeams();
        }
        function showMoreInfo() {

            currentView = "info";

            document.getElementById("statsSection").style.display = "none";
            document.getElementById("myStatusSection").style.display = "none";
            document.getElementById("teamsSection").style.display = "none";
            document.getElementById("tournamentsContainer").style.display = "none";
            document.getElementById("registeredTeamsSection").style.display = "none";

            document.getElementById("moreInfoSection").style.display = "block";

            window.scrollTo(0, 0); // 🔥 ESTO ES LO QUE FALTABA
        }
        function showMyTeams() {

            currentView = "tournaments";

            document.getElementById("statsSection").style.display = "flex";
            document.getElementById("myStatusSection").style.display = "block";
            document.getElementById("teamsContainer").style.display = "grid";
            document.getElementById("tournamentsContainer").style.display = "grid";

            document.getElementById("registeredTeamsSection").style.display = "none";
            document.getElementById("moreInfoSection").style.display = "none";
        }

        function renderRegisteredTeams() {

            const container = document.getElementById("registeredTeamsContainer");
            container.innerHTML = "";

            let teams = JSON.parse(localStorage.getItem("teams")) || [];

            teams.forEach(team => {

                const membersCount = team.members.length;
                const isFull = membersCount >= 7;
                const isMember = team.members.some(m => m.email === userEmail);

                const card = document.createElement("div");
                card.classList.add("team-card");

                card.innerHTML = `
            <h3>${team.name} [${team.tag}]</h3>
            <p>Miembros: ${membersCount}/7</p>

            ${isMember ? `
                <button class="join-btn" disabled>
                    YA ESTÁS DENTRO
                </button>
            ` : isFull ? `
                <button class="join-btn" disabled>
                    EQUIPO LLENO
                </button>
            ` : `
                <button class="join-btn"
                    onclick="joinTeam(${team.id})">
                    Unirme
                </button>
            `}
        `;

                container.appendChild(card);
            });
        }
        function goHome() {
            if (currentView === "registered" || currentView === "info") {
                showMyTeams();
                return;
            }
            window.location.href = "index.html";
        }

    </script>


</body>

</html>
