    <!-- GOOGLE TRANSLATE -->
    <script>
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'es',
                includedLanguages: 'es,en,fr,de,it,pt,ar',
                autoDisplay: false
            }, 'google_translate_element');
        }

        function translateLanguage(lang) {
            const interval = setInterval(() => {
                const select = document.querySelector(".goog-te-combo");
                if (select) {
                    select.value = lang;
                    select.dispatchEvent(new Event("change"));
                    clearInterval(interval);
                }
            }, 200);
        }
    </script>

    <div id="google_translate_element" style="display:none;"></div>

            } else {

            }
        }
    </script>
   <script>
document.addEventListener("DOMContentLoaded", function () {

    const isLogged = localStorage.getItem("userLogged");
    const userEmail = localStorage.getItem("userEmail");

    const authButtons = document.querySelector(".auth-buttons");
    const userInfo = document.querySelector(".user-info");
    const userNameSpan = document.querySelector(".user-name");
    const registerButton = document.querySelector(".accept-btn");
    const logoutBtn = document.querySelector(".logout-btn");

    // Si está logueado
    if (isLogged) {

        // Ocultar Login / Register
        if (authButtons) authButtons.style.display = "none";

        // Mostrar usuario
        if (userInfo) {
            userInfo.style.display = "block";
            if (userNameSpan) userNameSpan.textContent = userEmail;
        }

        // Cambiar texto del botón principal
        if (registerButton) {
            registerButton.textContent = "TORNEOS";
        }
    }

    // Logout
    if (logoutBtn) {
        logoutBtn.addEventListener("click", function () {
            localStorage.removeItem("userLogged");
            localStorage.removeItem("userEmail");
            window.location.reload();
        });
    }

});

// Función botón principal
function handleRegisterClick() {

    const isLogged = localStorage.getItem("userLogged");

    if (!isLogged) {
        window.location.href = "login.html";
    } else {
        window.location.href = "torneos.html";
    }
}
</script>
